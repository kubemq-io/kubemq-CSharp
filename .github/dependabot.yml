version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/src/KubeMQ.Sdk"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    reviewers:
      - "kubemq-io/sdk-maintainers"
    labels:
      - "dependencies"
      - "automated"
    ignore:
      # Don't bump Microsoft.Extensions.* to 9.x automatically —
      # major bumps require manual validation for net8.0 consumers
      - dependency-name: "Microsoft.Extensions.*"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: "deps"
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "ci"
      - "automated"
