name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore src/KubeMQ.Sdk/KubeMQ.Sdk.csproj

      - name: Check formatting
        run: dotnet format src/KubeMQ.Sdk/KubeMQ.Sdk.csproj --verify-no-changes --verbosity diagnostic

      - name: Build with analyzers
        run: dotnet build src/KubeMQ.Sdk/KubeMQ.Sdk.csproj --no-restore -warnaserror

      - name: Build examples
        run: dotnet build KubeMQ.sln --no-restore

  unit-tests:
    name: Unit Tests (.NET ${{ matrix.dotnet }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dotnet: ['8.0.x']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ matrix.dotnet }}

      - name: Restore
        run: dotnet restore tests/KubeMQ.Sdk.Tests.Unit/KubeMQ.Sdk.Tests.Unit.csproj

      - name: Build
        run: dotnet build tests/KubeMQ.Sdk.Tests.Unit/KubeMQ.Sdk.Tests.Unit.csproj --no-restore --configuration Release

      - name: Run unit tests
        run: >-
          dotnet test
          tests/KubeMQ.Sdk.Tests.Unit/KubeMQ.Sdk.Tests.Unit.csproj
          --no-build
          --configuration Release
          --logger "trx;LogFileName=unit-test-results.trx"
          --collect:"XPlat Code Coverage"
          --settings tests/coverlet.runsettings
          --results-directory ./test-results

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results-${{ matrix.dotnet }}
          path: ./test-results/**/*.trx

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.dotnet }}
          path: ./test-results/**/coverage.cobertura.xml

  example-smoke-test:
    name: Example Smoke Test
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    services:
      kubemq:
        image: kubemq/kubemq:latest
        ports:
          - 50000:50000
          - 8080:8080
          - 9090:9090
        env:
          KUBEMQ_TOKEN: ''
        options: >-
          --health-cmd "wget -q --spider http://localhost:8080/health || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Wait for KubeMQ server
        run: |
          for i in $(seq 1 30); do
            if wget -q --spider http://localhost:8080/health 2>/dev/null; then
              echo "KubeMQ server is ready"
              break
            fi
            echo "Waiting for KubeMQ server... ($i/30)"
            sleep 2
          done

      - name: Smoke-test examples
        run: |
          timeout 30 dotnet run --project Examples/Connection/Connection.Connect/ || true
          timeout 30 dotnet run --project Examples/Connection/Connection.Ping/ || true

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore tests/KubeMQ.Sdk.Tests.Unit/KubeMQ.Sdk.Tests.Unit.csproj

      - name: Build
        run: dotnet build tests/KubeMQ.Sdk.Tests.Unit/KubeMQ.Sdk.Tests.Unit.csproj --no-restore --configuration Release

      - name: Run tests with coverage
        run: >-
          dotnet test
          tests/KubeMQ.Sdk.Tests.Unit/KubeMQ.Sdk.Tests.Unit.csproj
          --no-build
          --configuration Release
          --collect:"XPlat Code Coverage"
          --settings tests/coverlet.runsettings
          --results-directory ./test-results

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./test-results/**/coverage.cobertura.xml
          flags: unittests
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
