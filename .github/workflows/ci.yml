name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore src/KubeMQ.Sdk/KubeMQ.Sdk.csproj

      - name: Check formatting
        run: dotnet format src/KubeMQ.Sdk/KubeMQ.Sdk.csproj --verify-no-changes --verbosity diagnostic

      - name: Build with analyzers
        run: dotnet build src/KubeMQ.Sdk/KubeMQ.Sdk.csproj --no-restore -warnaserror

      - name: Build examples
        run: dotnet build KubeMQ.sln --no-restore

  unit-tests:
    name: Unit Tests (.NET ${{ matrix.dotnet }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dotnet: ['8.0.x']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet }}

      - name: Restore
        run: dotnet restore tests/KubeMQ.Sdk.Tests.Unit/KubeMQ.Sdk.Tests.Unit.csproj

      - name: Build
        run: dotnet build tests/KubeMQ.Sdk.Tests.Unit/KubeMQ.Sdk.Tests.Unit.csproj --no-restore --configuration Release

      - name: Run unit tests
        run: >-
          dotnet test
          tests/KubeMQ.Sdk.Tests.Unit/KubeMQ.Sdk.Tests.Unit.csproj
          --no-build
          --configuration Release
          --logger "trx;LogFileName=unit-test-results.trx"
          --collect:"XPlat Code Coverage"
          --settings tests/coverlet.runsettings
          --results-directory ./test-results

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: unit-test-results-${{ matrix.dotnet }}
          path: ./test-results/**/*.trx

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.dotnet }}
          path: ./test-results/**/coverage.cobertura.xml

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore tests/KubeMQ.Sdk.Tests.Unit/KubeMQ.Sdk.Tests.Unit.csproj

      - name: Build
        run: dotnet build tests/KubeMQ.Sdk.Tests.Unit/KubeMQ.Sdk.Tests.Unit.csproj --no-restore --configuration Release

      - name: Run tests with coverage
        run: >-
          dotnet test
          tests/KubeMQ.Sdk.Tests.Unit/KubeMQ.Sdk.Tests.Unit.csproj
          --no-build
          --configuration Release
          --collect:"XPlat Code Coverage"
          --settings tests/coverlet.runsettings
          --results-directory ./test-results

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./test-results/**/coverage.cobertura.xml
          flags: unittests
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
